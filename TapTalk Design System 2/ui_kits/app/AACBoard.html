<!-- @dsCard group="App" viewport="470x910" name="AAC board (layout)" subtitle="iPhone 16 · naked board ready for ARASAAC symbols" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TapTalk — AAC Board</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #C7D2DD;
    font-family: var(--tt-font-display);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  #scaler { transform-origin: center center; }

  /* ── iPhone 16 device (393 × 852 pt screen) ───────────────────── */
  .device {
    width: 417px; height: 876px;
    background: #1a1a1c;
    border-radius: 58px;
    padding: 12px;
    box-shadow: 0 40px 90px rgba(20,40,60,0.4), inset 0 0 2px 1px rgba(255,255,255,0.18);
    position: relative;
  }
  .screen {
    width: 393px; height: 852px;
    background: var(--tt-background);
    border-radius: 47px;
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
  }
  .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 122px; height: 35px; background: #000; border-radius: 20px; z-index: 30;
  }

  /* ── status bar ───────────────────────────────────────────────── */
  .statusbar {
    height: 54px; flex: none; display: flex; align-items: flex-end;
    justify-content: space-between; padding: 0 30px 6px 34px;
    font-weight: 800; font-size: 16px; color: var(--tt-text);
  }
  .statusbar .right { display: flex; align-items: center; gap: 7px; }
  .statusbar svg { display: block; }

  /* ── message strip ────────────────────────────────────────────── */
  .msgrow { display: flex; gap: 10px; padding: 10px 16px 12px; }
  .msgcard {
    flex: 1; min-height: 96px; background: var(--tt-surface);
    border: 1.5px solid var(--tt-border); border-radius: 16px;
    display: flex; align-items: center; padding: 0 18px; position: relative;
  }
  .msgcard .placeholder {
    font-family: var(--tt-font-base); font-weight: 400;
    font-size: 24px; color: var(--tt-text-tertiary);
  }
  .msgcard .backspace {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    width: 46px; height: 34px; object-fit: contain;
  }
  .sidepanel {
    width: 64px; flex: none; border: 1.5px solid var(--tt-border);
    border-radius: 16px; background: var(--tt-surface);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 8px;
  }
  .sidepanel .sbtn {
    width: 48px; height: 40px; border-radius: 10px; border: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .sidepanel .sbtn img { width: 26px; height: 26px; object-fit: contain; }
  .sbtn.red { background: var(--tt-danger); }
  .sbtn.green { background: var(--tt-success); }

  /* ── category bar ─────────────────────────────────────────────── */
  .catbar {
    background: var(--tt-nav-background); border-top: 1px solid #E5EAF0;
    border-bottom: 1px solid #E5EAF0;
    display: flex; gap: 10px; padding: 11px 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .catbar::-webkit-scrollbar { display: none; }
  .pill {
    flex: none; min-height: 36px; padding: 0 18px; border-radius: 22px;
    border: none; cursor: pointer; font-family: var(--tt-font-display);
    font-weight: 700; font-size: 16px; color: #fff;
    display: flex; align-items: center; justify-content: center;
    background: var(--tt-primary); -webkit-tap-highlight-color: transparent;
    transition: transform 120ms ease;
  }
  .pill.active { background: var(--tt-primary-dark); }
  .pill:active { transform: scale(0.96); }

  /* ── symbol grid ──────────────────────────────────────────────── */
  .gridwrap { flex: 1; min-height: 0; overflow-y: auto; padding: 14px 16px; }
  .grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px;
  }
  .cell {
    position: relative; aspect-ratio: 1 / 1; border-radius: 8px;
    border: 2px solid var(--tt-symbol-outline);
    box-shadow: 0 1px 2px rgba(0,0,0,0.14);
    cursor: pointer; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    transition: transform 120ms cubic-bezier(0.34,1.3,0.64,1);
  }
  .cell:active { transform: scale(0.9); }
  .cell .label {
    position: absolute; top: 4px; left: 0; right: 0; text-align: center;
    font-family: var(--tt-font-display); font-weight: 700;
    font-size: 14px; color: var(--tt-text); line-height: 1.05;
  }
  /* word-type fills */
  .c-conjunction { background: var(--tt-sym-conjunction); }
  .c-noun        { background: var(--tt-sym-noun); }
  .c-pronoun     { background: var(--tt-sym-pronoun); }
  .c-verb        { background: var(--tt-sym-verb); }
  .c-adjective   { background: var(--tt-sym-adjective); }
  .c-question    { background: var(--tt-sym-question); }
  .c-social      { background: var(--tt-sym-social); }
  .c-article     { background: var(--tt-sym-article); }
  .c-interjection{ background: var(--tt-sym-interjection); }
  .c-folder      { background: var(--tt-folder-bg); }

  /* article cell: big centred white word */
  .cell.article-cell { display: flex; align-items: center; justify-content: center; }
  .cell.article-cell .word {
    font-family: var(--tt-font-display); font-weight: 800;
    font-size: 24px; color: #fff;
  }
  /* question cell: big white ? */
  .cell .qmark {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; padding-top: 14px;
    font-family: var(--tt-font-display); font-weight: 800;
    font-size: 38px; color: #fff;
  }
  /* folder cell: cream envelope flap */
  .cell.folder-cell .flap {
    position: absolute; top: 0; left: 0; right: 0; height: 42%;
    background: var(--tt-folder-flap-2);
    border-bottom: 1.5px solid rgba(67,67,67,0.35);
    clip-path: polygon(0 0, 100% 0, 100% 58%, 50% 100%, 0 58%);
  }
  .cell.folder-cell .label { z-index: 2; }

  /* ── bottom nav ───────────────────────────────────────────────── */
  .navbar {
    flex: none; background: var(--tt-nav-background);
    border-top: 1px solid #E5EAF0; padding-top: 6px;
  }
  .navbar img { display: block; width: 100%; height: 64px; object-fit: contain; }
  .homebar {
    height: 28px; display: flex; align-items: center; justify-content: center;
    background: var(--tt-nav-background);
  }
  .homebar span { width: 138px; height: 5px; border-radius: 3px; background: #111; }
</style>
</head>
<body>
<div id="scaler">
  <div class="device">
    <div class="screen">
      <div class="island"></div>

      <!-- status bar -->
      <div class="statusbar">
        <span>9:41</span>
        <span class="right">
          <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1" fill="#202020"/><rect x="4.5" y="5" width="3" height="7" rx="1" fill="#202020"/><rect x="9" y="2.5" width="3" height="9.5" rx="1" fill="#202020"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#202020"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2.2c2.3 0 4.4.9 6 2.4l1.2-1.3C13.8 1.4 11.3.4 8.5.4S3.2 1.4 1.3 3.3L2.5 4.6c1.6-1.5 3.7-2.4 6-2.4z" fill="#202020"/><path d="M8.5 5.6c1.4 0 2.7.6 3.6 1.5l1.2-1.3C12.1 4.6 10.4 3.9 8.5 3.9S4.9 4.6 3.7 5.8L4.9 7.1c.9-.9 2.2-1.5 3.6-1.5z" fill="#202020"/><circle cx="8.5" cy="9.8" r="1.8" fill="#202020"/></svg>
          <svg width="26" height="13" viewBox="0 0 26 13"><rect x="0.5" y="0.5" width="21" height="12" rx="3.5" fill="none" stroke="#202020" stroke-opacity="0.45"/><rect x="2" y="2" width="17" height="9" rx="2" fill="#202020"/><rect x="23" y="4" width="1.8" height="5" rx="0.9" fill="#202020" fill-opacity="0.45"/></svg>
        </span>
      </div>

      <!-- message strip -->
      <div class="msgrow">
        <div class="msgcard">
          <span class="placeholder">Tap to speak....</span>
          <img class="backspace" src="../../assets/aac/backspace.png" alt="Backspace" />
        </div>
        <div class="sidepanel">
          <button class="sbtn red" aria-label="Clear all"><img src="../../assets/aac/btn_delete.png" alt="" /></button>
          <button class="sbtn green" aria-label="Save phrase"><img src="../../assets/aac/btn_save.png" alt="" /></button>
        </div>
      </div>

      <!-- category bar -->
      <div class="catbar">
        <button class="pill active">Main</button>
        <button class="pill">Actions</button>
        <button class="pill">Feelings</button>
        <button class="pill">Food</button>
        <button class="pill">Social</button>
      </div>

      <!-- grid -->
      <div class="gridwrap">
        <div class="grid">
          <div class="cell c-conjunction"><span class="label">Hello</span></div>
          <div class="cell c-noun"><span class="label">Car</span></div>
          <div class="cell c-pronoun"><span class="label">Him</span></div>
          <div class="cell c-verb"><span class="label">Run</span></div>
          <div class="cell c-adjective"><span class="label">Big</span></div>

          <div class="cell c-question"><span class="label">Where</span><span class="qmark">?</span></div>
          <div class="cell c-social"><span class="label">Please</span></div>
          <div class="cell c-article article-cell"><span class="word">The</span></div>
          <div class="cell c-interjection"><span class="label">Ouch</span></div>
          <div class="cell c-folder folder-cell"><div class="flap"></div><span class="label">Places</span></div>

          <div class="cell c-folder folder-cell"><div class="flap"></div><span class="label">Sports</span></div>
        </div>
      </div>

      <!-- bottom nav -->
      <div class="navbar">
        <img src="../../assets/aac/bottom_nav.png" alt="Talk, Learn, Settings, Profile" />
      </div>
      <div class="homebar"><span></span></div>
    </div>
  </div>
</div>
<script>
  function fit() {
    const pad = 24;
    const s = Math.min(1, (window.innerHeight - pad) / 876, (window.innerWidth - pad) / 417);
    document.getElementById('scaler').style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit); fit();
</script>
</body>
</html>
