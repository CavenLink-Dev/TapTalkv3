<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4 · 8 · 12 · 16 · 24 · 32" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--tt-surface); font-family: var(--tt-font-base); color: var(--tt-text); }
  .row { display: flex; align-items: flex-end; gap: 20px; padding: 24px; }
  .item { text-align: center; }
  .bar { background: var(--tt-primary); border-radius: 4px; width: 28px; }
  .n { font-family: var(--tt-font-display); font-weight: 800; font-size: 13px; margin-top: 8px; }
  .k { font-size: 11px; color: var(--tt-text-tertiary); }
</style></head><body>
<div class="row">
  <div class="item"><div class="bar" style="height:4px"></div><div class="n">4</div><div class="k">xs</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="n">8</div><div class="k">sm</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="n">12</div><div class="k">md</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="n">16</div><div class="k">lg</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="n">24</div><div class="k">xl</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="n">32</div><div class="k">xxl</div></div>
</div>
</body></html>
