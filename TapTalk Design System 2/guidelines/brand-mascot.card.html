<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--tt-background); font-family: var(--tt-font-base); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 18px; }
  .cell { background: var(--tt-surface); border-radius: 14px; padding: 8px; text-align: center; box-shadow: var(--tt-shadow-card); }
  .cell img { width: 100%; height: auto; aspect-ratio: 1; object-fit: contain; }
  .cap { font-size: 9px; color: var(--tt-text-tertiary); margin-top: 4px; }
</style></head><body>
<div class="grid">
  <div class="cell"><img src="../assets/mascots/happy_smile.png" alt="happy smile" /><div class="cap">happy</div></div>
  <div class="cell"><img src="../assets/mascots/excited_wave.png" alt="excited wave" /><div class="cap">wave</div></div>
  <div class="cell"><img src="../assets/mascots/heart_eyes.png" alt="heart eyes" /><div class="cap">love</div></div>
  <div class="cell"><img src="../assets/mascots/winking_smile.png" alt="winking" /><div class="cap">wink</div></div>
  <div class="cell"><img src="../assets/mascots/excited_sparkle.png" alt="sparkle" /><div class="cap">sparkle</div></div>
  <div class="cell"><img src="../assets/mascots/thinking_puzzled.png" alt="thinking" /><div class="cap">think</div></div>
  <div class="cell"><img src="../assets/mascots/neutral_curious.png" alt="curious" /><div class="cap">curious</div></div>
  <div class="cell"><img src="../assets/mascots/sad_worried.png" alt="worried" /><div class="cap">worried</div></div>
  <div class="cell"><img src="../assets/mascots/crying.png" alt="crying" /><div class="cap">cry</div></div>
  <div class="cell"><img src="../assets/mascots/sleeping.png" alt="sleeping" /><div class="cap">sleep</div></div>
  <div class="cell"><img src="../assets/mascots/shocked.png" alt="shocked" /><div class="cap">shock</div></div>
  <div class="cell"><img src="../assets/mascots/nervous_sweat.png" alt="nervous" /><div class="cap">nervous</div></div>
  <div class="cell"><img src="../assets/mascots/angry.png" alt="angry" /><div class="cap">angry</div></div>
  <div class="cell"><img src="../assets/mascots/content_closed_eyes.png" alt="content" /><div class="cap">content</div></div>
</div>
</body></html>
