<!-- @dsCard group="Colors" viewport="700x200" name="AAC symbol palette" subtitle="Fitzgerald-key word-type colours" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--tt-surface); font-family: var(--tt-font-base); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; padding: 16px; }
  .chip { height: 44px; border-radius: 10px; border: 2px solid var(--tt-symbol-outline); }
  .name { font-family: var(--tt-font-display); font-weight: 700; font-size: 11px; color: var(--tt-text); margin-top: 6px; }
  .hex { font-size: 10px; color: var(--tt-text-tertiary); letter-spacing: 0.2px; }
</style></head><body>
<div class="grid">
  <div><div class="chip" style="background:#5CD65C"></div><div class="name">Verb</div><div class="hex">#5CD65C</div></div>
  <div><div class="chip" style="background:#BD73FF"></div><div class="name">Noun</div><div class="hex">#BD73FF</div></div>
  <div><div class="chip" style="background:#E8C917"></div><div class="name">Pronoun</div><div class="hex">#E8C917</div></div>
  <div><div class="chip" style="background:#5CC9E8"></div><div class="name">Adjective</div><div class="hex">#5CC9E8</div></div>
  <div><div class="chip" style="background:#F58625"></div><div class="name">Question</div><div class="hex">#F58625</div></div>
  <div><div class="chip" style="background:#4863CF"></div><div class="name">Social</div><div class="hex">#4863CF</div></div>
  <div><div class="chip" style="background:#FA838E"></div><div class="name">Conjunction</div><div class="hex">#FA838E</div></div>
  <div><div class="chip" style="background:#7AA3C7"></div><div class="name">Preposition</div><div class="hex">#7AA3C7</div></div>
  <div><div class="chip" style="background:#D22CCA"></div><div class="name">Article</div><div class="hex">#D22CCA</div></div>
  <div><div class="chip" style="background:#FF5C5C"></div><div class="name">Negation</div><div class="hex">#FF5C5C</div></div>
  <div><div class="chip" style="background:#D32626"></div><div class="name">Interjection</div><div class="hex">#D32626</div></div>
  <div><div class="chip" style="background:#EDE070"></div><div class="name">Folder</div><div class="hex">#EDE070</div></div>
</div>
</body></html>
