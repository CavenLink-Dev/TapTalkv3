<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="30 / 24 / 20 / 17 / 15 / 12 / 10" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--tt-surface); color: var(--tt-text); }
  .wrap { padding: 16px 24px; display: flex; flex-direction: column; gap: 8px; }
  .r { display: flex; align-items: baseline; gap: 16px; }
  .r .t { font-family: var(--tt-font-display); font-weight: 800; line-height: 1.1; }
  .r .m { font-family: var(--tt-font-base); font-size: 11px; color: var(--tt-text-tertiary); }
</style></head><body>
<div class="wrap">
  <div class="r"><span class="t" style="font-size:30px">Title</span><span class="m">30 · title</span></div>
  <div class="r"><span class="t" style="font-size:24px">Heading</span><span class="m">24 · heading</span></div>
  <div class="r"><span class="t" style="font-size:20px">Subheading</span><span class="m">20 · subheading</span></div>
  <div class="r"><span class="t" style="font-size:17px;font-weight:600">Body / input</span><span class="m">17 · body</span></div>
  <div class="r"><span class="t" style="font-size:15px;font-weight:600">Callout</span><span class="m">15 · callout</span></div>
  <div class="r"><span class="t" style="font-size:12px;font-weight:700">CAPTION / LABEL</span><span class="m">12 · caption</span></div>
  <div class="r"><span class="t" style="font-size:10px;font-weight:700">TAB</span><span class="m">10 · tab</span></div>
</div>
</body></html>
