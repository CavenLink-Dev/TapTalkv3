<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--tt-surface); font-family: var(--tt-font-base); color: var(--tt-text); }
  .wrap { padding: 20px 24px; }
  .body { font-size: 17px; line-height: 1.45; max-width: 560px; color: var(--tt-text-muted); }
  .label { font-family: var(--tt-font-display); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.2px; color: var(--tt-primary); margin-bottom: 4px; }
  .meta { font-size: 12px; color: var(--tt-text-tertiary); margin-top: 12px; }
</style></head><body>
<div class="wrap">
  <div class="label">Name</div>
  <div class="body">Choose how long TapTalk should wait before automatically locking due to inactivity. This can be changed in the settings later.</div>
  <div class="meta">SF Compact · web fallback Hanken Grotesk · 400–700 weights · used for body, inputs, helper text</div>
</div>
</body></html>
