<!-- @dsCard group="Colors" viewport="700x150" name="Status" subtitle="Error, success, warning, folder" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--tt-surface); font-family: var(--tt-font-base); }
  .grid { display: flex; gap: 12px; padding: 16px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: 12px; }
  .name { font-family: var(--tt-font-display); font-weight: 800; font-size: 13px; color: var(--tt-text); margin-top: 8px; }
  .hex { font-size: 12px; color: var(--tt-text-tertiary); margin-top: 1px; letter-spacing: 0.3px; }
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#F3312A"></div><div class="name">Danger</div><div class="hex">#F3312A</div></div>
  <div class="sw"><div class="chip" style="background:#30D158"></div><div class="name">Success</div><div class="hex">#30D158</div></div>
  <div class="sw"><div class="chip" style="background:#FF9500"></div><div class="name">Warning</div><div class="hex">#FF9500</div></div>
  <div class="sw"><div class="chip" style="background:#EDE070"></div><div class="name">Folder</div><div class="hex">#EDE070</div></div>
</div>
</body></html>
