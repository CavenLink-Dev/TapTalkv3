<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--tt-font-base); }
  .row { display: flex; gap: 0; height: 200px; }
  .cell { flex: 1; display: flex; align-items: center; justify-content: center; }
  .light { background: var(--tt-background); }
  .dark { background: #0D2436; }
  img { width: 220px; height: auto; }
</style></head><body>
<div class="row">
  <div class="cell light"><img src="../assets/logo/taptalk_logo.png" alt="taptalk logo" /></div>
  <div class="cell dark"><img src="../assets/logo/taptalk_logo.png" alt="taptalk logo on dark" /></div>
</div>
</body></html>
