<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows & elevation" subtitle="Subtle card lift · brand pop" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--tt-background); font-family: var(--tt-font-base); color: var(--tt-text); }
  .row { display: flex; gap: 28px; padding: 28px; }
  .item { text-align: center; }
  .box { width: 130px; height: 78px; background: var(--tt-surface); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-family: var(--tt-font-display); font-weight: 800; font-size: 13px; }
  .k { font-size: 11px; color: var(--tt-text-tertiary); margin-top: 10px; }
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--tt-shadow-card)">Card</div><div class="k">0 2px 8px · black 6%</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--tt-shadow-pop)">Pop</div><div class="k">0 4px 16px · blue 22%</div></div>
  <div class="item"><div class="box" style="border:1.5px solid var(--tt-border);box-shadow:none">Flat</div><div class="k">hairline border only</div></div>
</div>
</body></html>
