<!-- @dsCard group="Colors" viewport="700x150" name="Brand / interactive" subtitle="Primary blue family + states" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--tt-surface); font-family: var(--tt-font-base); }
  .grid { display: flex; gap: 0; padding: 16px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: 12px; }
  .name { font-family: var(--tt-font-display); font-weight: 800; font-size: 13px; color: var(--tt-text); margin-top: 8px; }
  .hex { font-size: 12px; color: var(--tt-text-tertiary); margin-top: 1px; letter-spacing: 0.3px; }
  .grid { gap: 12px; }
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#199AEE"></div><div class="name">Primary</div><div class="hex">#199AEE</div></div>
  <div class="sw"><div class="chip" style="background:#006DD3"></div><div class="name">Primary Dark</div><div class="hex">#006DD3</div></div>
  <div class="sw"><div class="chip" style="background:#62C1FF"></div><div class="name">Pressed</div><div class="hex">#62C1FF</div></div>
  <div class="sw"><div class="chip" style="background:#D5E1E8"></div><div class="name">Soft Blue</div><div class="hex">#D5E1E8</div></div>
  <div class="sw"><div class="chip" style="background:#54ACFF"></div><div class="name">Mascot</div><div class="hex">#54ACFF</div></div>
</div>
</body></html>
